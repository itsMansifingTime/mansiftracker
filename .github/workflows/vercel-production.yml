# Deploy Production when Vercel ↔ GitHub webhooks are missing.
# GitHub repo → Settings → Secrets and variables → Actions → New repository secret:
#   VERCEL_TOKEN       — https://vercel.com/account/settings/tokens
#   VERCEL_ORG_ID      — Project → Settings → General → "Team ID" / run `npx vercel link` locally and read .vercel/project.json → orgId
#   VERCEL_PROJECT_ID  — same page "Project ID" / project.json → projectId
#
# If native Vercel Git deploys work again, remove this workflow to avoid double deploys.
name: Vercel Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # v5 uses Node 24 runtime (avoids Node 20 deprecation on older checkout majors)
      - uses: actions/checkout@v5

      - name: Write .vercel/project.json (repo is gitignored; CLI needs link in CI)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          test -n "${VERCEL_ORG_ID:-}" || { echo "Missing secret VERCEL_ORG_ID"; exit 1; }
          test -n "${VERCEL_PROJECT_ID:-}" || { echo "Missing secret VERCEL_PROJECT_ID"; exit 1; }
          mkdir -p .vercel
          node -e "const fs=require('fs');fs.writeFileSync('.vercel/project.json',JSON.stringify({orgId:process.env.VERCEL_ORG_ID,projectId:process.env.VERCEL_PROJECT_ID,projectName:'mansiftracker'}));"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Verify Vercel token (fails fast if VERCEL_TOKEN is wrong or expired)
        run: vercel whoami --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to Vercel (remote build)
        run: vercel deploy --prod --yes --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
